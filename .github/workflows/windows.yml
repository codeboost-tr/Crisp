name: Windows

# CI for the Windows port (apps/desktop-win, Avalonia/.NET). Mirrors the macOS
# pipeline's gate: build → headless self-tests + the shared engine's Python tests
# (run here on real Windows, so the OS-aware encoder branch is exercised on the
# platform it targets) → publish a self-contained win-x64 build as an artifact a
# reviewer can run. The engine lives in apps/desktop/Resources/engine and is
# shared, so a change there also triggers this.
on:
  push:
    branches: [main, nightly]
    paths:
      - "apps/desktop-win/**"
      - "apps/desktop/Resources/engine/**"
      - ".github/workflows/windows.yml"
  pull_request:
    paths:
      - "apps/desktop-win/**"
      - "apps/desktop/Resources/engine/**"
      - ".github/workflows/windows.yml"

permissions:
  contents: read

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build, test & publish (win-x64)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/desktop-win
    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Restore & build
        run: dotnet build -c Release

      # Headless self-tests (Program.cs --*-test modes) — the same checks run on the
      # dev's Mac. Each returns non-zero on failure, so a regression fails the job.
      - name: App self-tests
        run: |
          dotnet run -c Release --no-build -- --preset-test
          dotnet run -c Release --no-build -- --channel-test
          dotnet run -c Release --no-build -- --editor-test
          New-Item -ItemType File -Path sample.mp4 -Force | Out-Null
          Set-Content -Path sample.mp4 -Value ("x" * 4096)
          dotnet run -c Release --no-build -- --watch-test sample.mp4

      # The shared cleaning engine is stdlib-only Python — on Windows these exercise
      # the win32 encoder/teardown branches the macOS runner never hits.
      - name: Engine unit tests (Python, on Windows)
        working-directory: apps/desktop/Resources/engine
        run: python -m unittest discover -s tests -t .

      - name: Publish self-contained win-x64
        run: |
          dotnet publish Crisp.csproj -c Release -r win-x64 --self-contained `
            -p:PublishSingleFile=false -o publish
          # Bundle the shared engine beside the .exe (ResolveEngineScript finds it at
          # engine/clean_video.py). The win64 ffmpeg/whisper/python binaries are added
          # by vendor-win.ps1 / resolved from PATH at runtime.
          Copy-Item -Recurse -Force ../desktop/Resources/engine publish/engine

      - name: Upload Windows build
        uses: actions/upload-artifact@v7
        with:
          name: Crisp-win-x64
          path: apps/desktop-win/publish
